<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Price Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --txt:#e6e6e6; --muted:#8a8f99; --accent:#4f9eff; --green:#3ddc84; --red:#ff5a5a; --border:#2a2f3a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:1rem 2rem; background:var(--card); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  h1 { margin:0; font-size:1.3rem; }
  main { padding:1.5rem; max-width:1400px; margin:auto; }
  .summary { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; }
  .stat { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:1rem 1.5rem; flex:1; min-width:200px; }
  .stat .label { color:var(--muted); font-size:.85rem; }
  .stat .value { font-size:1.5rem; font-weight:600; margin-top:.3rem; }
  .actions { margin-bottom:1rem; display:flex; gap:.5rem; flex-wrap:wrap; }
  button { background:var(--accent); color:#fff; border:none; padding:.6rem 1.2rem; border-radius:6px; cursor:pointer; font-size:.9rem; }
  button:hover { opacity:.9; }
  button.danger { background:var(--red); }
  button.success { background:var(--green); color:#0f1115; }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--txt); }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:8px; overflow:hidden; }
  th, td { padding:.8rem; text-align:left; border-bottom:1px solid var(--border); font-size:.9rem; vertical-align:middle; }
  th { background:#23262f; color:var(--muted); font-weight:500; }
  tr:last-child td { border-bottom:none; }
  tr.purchased { opacity:.55; }
  tr.purchased .price-cell { text-decoration: line-through; }
  .price-down { color:var(--green); }
  .price-up { color:var(--red); }
  .badge { padding:2px 8px; border-radius:4px; font-size:.75rem; }
  .badge.ok { background:rgba(61,220,132,.15); color:var(--green); }
  .badge.ko { background:rgba(255,90,90,.15); color:var(--red); }
  .badge.purchased { background:var(--green); color:#0f1115; }
  .name-cell { display:flex; align-items:center; gap:.7rem; }
  .name-cell img { width:48px; height:48px; object-fit:contain; background:#10131a; border-radius:6px; border:1px solid var(--border); }
  .name-cell .no-img { width:48px; height:48px; display:flex; align-items:center; justify-content:center; background:#10131a; border-radius:6px; border:1px solid var(--border); color:var(--muted); font-size:1.2rem; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:10; }
  .modal.show { display:flex; }
  .modal-content { background:var(--card); padding:1.5rem; border-radius:10px; max-width:500px; width:90%; max-height:90vh; overflow-y:auto; }
  .modal-content h2 { margin-top:0; }
  label { display:block; margin:.8rem 0 .3rem; font-size:.85rem; color:var(--muted); }
  input { width:100%; padding:.6rem; background:#10131a; border:1px solid var(--border); border-radius:6px; color:var(--txt); font-size:.9rem; }
  .row-actions { display:flex; gap:.3rem; flex-wrap:wrap; }
  .row-actions button { padding:.3rem .6rem; font-size:.8rem; }
  #chart-container { background:var(--card); padding:1rem; border-radius:8px; margin-top:1rem; display:none; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>
<body>
<header>
  <h1>💰 Price Tracker</h1>
  <div id="config-info"></div>
</header>
<main>
  <div class="summary">
    <div class="stat"><div class="label">Articles suivis</div><div class="value" id="stat-count">0</div></div>
    <div class="stat"><div class="label">Total restant</div><div class="value" id="stat-total">0</div></div>
    <div class="stat"><div class="label">Déjà acheté</div><div class="value" id="stat-purchased">0</div></div>
  </div>
  <div class="actions">
    <button onclick="openModal()">+ Ajouter un article</button>
    <button class="ghost" onclick="loadArticles()">↻ Rafraîchir</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>Nom</th><th>Prix actuel</th><th>Cible</th><th>Dernier check</th><th>Statut</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="articles-body"></tbody>
  </table>
  <div id="chart-container">
    <h3 id="chart-title"></h3>
    <canvas id="price-chart"></canvas>
  </div>
</main>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modal-title">Ajouter un article</h2>
    <input type="hidden" id="article-id">
    <label>Nom</label>
    <input id="f-name" placeholder="RTX 5090 Asus Astral">
    <label>URL produit</label>
    <input id="f-url" placeholder="https://...">
    <label>Sélecteur CSS du prix</label>
    <input id="f-css" placeholder=".price, #productPrice...">
    <label>Sélecteur CSS de l'image (optionnel)</label>
    <input id="f-img-css" placeholder="#landingImage, .product-image img...">
    <label>Prix cible (optionnel)</label>
    <input id="f-target" type="number" step="0.01" placeholder="0">
    <div style="margin-top:1rem; display:flex; gap:.5rem; justify-content:flex-end; flex-wrap:wrap;">
      <button class="ghost" onclick="testScrape()">Tester</button>
      <button class="ghost" onclick="closeModal()">Annuler</button>
      <button onclick="saveArticle()">Enregistrer</button>
    </div>
    <div id="test-result" style="margin-top:.8rem; font-size:.85rem; color:var(--muted);"></div>
  </div>
</div>

<script>
let currency = "EUR";
let chart = null;

async function loadConfig() {
  const r = await fetch("/api/config"); const d = await r.json();
  currency = d.currency;
  document.getElementById("config-info").textContent = "Devise : " + currency;
}

async function loadSummary() {
  const r = await fetch("/api/summary"); const d = await r.json();
  document.getElementById("stat-count").textContent = d.count + (d.count_purchased ? ` (${d.count_purchased} achetés)` : "");
  document.getElementById("stat-total").textContent = (d.total_estimated || 0).toFixed(2) + " " + currency;
  document.getElementById("stat-purchased").textContent = (d.total_purchased || 0).toFixed(2) + " " + currency;
}

async function loadArticles() {
  const r = await fetch("/api/articles"); const arts = await r.json();
  const tb = document.getElementById("articles-body");
  tb.innerHTML = "";
  arts.forEach(a => {
    const tr = document.createElement("tr");
    if (a.purchased) tr.classList.add("purchased");
    const price = a.last_price ? a.last_price.toFixed(2) + " " + currency : "—";
    const target = a.target_price ? a.target_price.toFixed(2) + " " + currency : "—";
    const lastCheck = a.last_check ? new Date(a.last_check + "Z").toLocaleString("fr-FR") : "Jamais";
    let status = a.active ? '<span class="badge ok">Actif</span>' : '<span class="badge ko">Inactif</span>';
    if (a.purchased) status += ' <span class="badge purchased">Acheté</span>';
    const img = a.image_url
      ? `<img src="${a.image_url}" alt="" onerror="this.outerHTML='<div class=\\'no-img\\'>📦</div>'">`
      : `<div class="no-img">📦</div>`;
    const safeName = a.name.replace(/'/g,"\\'");
    tr.innerHTML = `
      <td><div class="name-cell">${img}<a href="${a.url}" target="_blank">${a.name}</a></div></td>
      <td class="price-cell">${price}</td>
      <td>${target}</td>
      <td>${lastCheck}</td>
      <td>${status}</td>
      <td class="row-actions">
        <button onclick="checkNow(${a.id})" title="Vérifier maintenant">↻</button>
        <button onclick="showHistory(${a.id}, '${safeName}')" title="Historique">📊</button>
        <button onclick="togglePurchased(${a.id}, ${a.purchased ? 0 : 1})" class="${a.purchased ? 'ghost' : 'success'}" title="${a.purchased ? 'Marquer non acheté' : 'Marquer acheté'}">${a.purchased ? '↩️' : '✅'}</button>
        <button onclick="editArticle(${a.id})" class="ghost" title="Modifier">✏️</button>
        <button onclick="deleteArticle(${a.id})" class="danger" title="Supprimer">🗑</button>
      </td>`;
    tb.appendChild(tr);
  });
  loadSummary();
}

function openModal() {
  document.getElementById("modal-title").textContent = "Ajouter un article";
  document.getElementById("article-id").value = "";
  ["f-name","f-url","f-css","f-img-css","f-target"].forEach(i => document.getElementById(i).value = "");
  document.getElementById("test-result").textContent = "";
  document.getElementById("modal").classList.add("show");
}
function closeModal() { document.getElementById("modal").classList.remove("show"); }

async function saveArticle() {
  const id = document.getElementById("article-id").value;
  const body = {
    name: document.getElementById("f-name").value,
    url: document.getElementById("f-url").value,
    css_selector: document.getElementById("f-css").value,
    image_selector: document.getElementById("f-img-css").value || null,
    target_price: parseFloat(document.getElementById("f-target").value) || null
  };
  if (!body.name || !body.url || !body.css_selector) { alert("Champs requis manquants"); return; }
  if (id) {
    body.active = true;
    await fetch("/api/articles/" + id, { method:"PUT", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
  } else {
    await fetch("/api/articles", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
  }
  closeModal();
  loadArticles();
}

async function testScrape() {
  const body = {
    name: "test",
    url: document.getElementById("f-url").value,
    css_selector: document.getElementById("f-css").value
  };
  const el = document.getElementById("test-result");
  el.textContent = "Test en cours...";
  const r = await fetch("/api/test-scrape", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
  const d = await r.json();
  el.innerHTML = `Prix détecté: <b>${d.price ?? "—"}</b> | OCR brut: "${d.raw_text}" | Erreur: ${d.error ?? "aucune"}`;
}

async function deleteArticle(id) {
  if (!confirm("Supprimer cet article ?")) return;
  await fetch("/api/articles/" + id, { method:"DELETE" });
  loadArticles();
}

async function togglePurchased(id, purchased) {
  await fetch(`/api/articles/${id}/purchased`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ purchased: !!purchased })
  });
  loadArticles();
}

async function editArticle(id) {
  const r = await fetch("/api/articles"); const arts = await r.json();
  const a = arts.find(x => x.id === id); if (!a) return;
  document.getElementById("modal-title").textContent = "Modifier l'article";
  document.getElementById("article-id").value = a.id;
  document.getElementById("f-name").value = a.name;
  document.getElementById("f-url").value = a.url;
  document.getElementById("f-css").value = a.css_selector;
  document.getElementById("f-img-css").value = a.image_selector || "";
  document.getElementById("f-target").value = a.target_price || "";
  document.getElementById("modal").classList.add("show");
}

async function checkNow(id) {
  await fetch(`/api/articles/${id}/check`, { method:"POST" });
  loadArticles();
}

async function showHistory(id, name) {
  const r = await fetch(`/api/articles/${id}/history?limit=200`);
  const data = await r.json();
  const ok = data.filter(d => d.success).reverse();
  document.getElementById("chart-container").style.display = "block";
  document.getElementById("chart-title").textContent = "Historique : " + name;
  const labels = ok.map(d => new Date(d.checked_at + "Z").toLocaleString("fr-FR"));
  const prices = ok.map(d => d.price);
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("price-chart"), {
    type: "line",
    data: { labels, datasets: [{ label: "Prix (" + currency + ")", data: prices, borderColor: "#4f9eff", backgroundColor: "rgba(79,158,255,.1)", fill:true, tension:.2 }] },
    options: { responsive:true, plugins:{ legend:{ labels:{ color:"#e6e6e6" } } }, scales:{ x:{ ticks:{ color:"#8a8f99" } }, y:{ ticks:{ color:"#8a8f99" } } } }
  });
}

loadConfig().then(loadArticles);
setInterval(loadArticles, 60000);
</script>
</body>
</html>
